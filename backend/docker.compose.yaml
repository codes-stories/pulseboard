name: pulseboard

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulseboard-postgres
    environment:
      POSTGRES_DB: pulseboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pulseboard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pulseboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulseboard-redis
    ports:
      - "6379:6379"
    volumes:
      - pulseboard_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pulseboard-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - pulseboard_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pulseboard_postgres_data:
  pulseboard_redis_data:
  pulseboard_rabbitmq_data:
